<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>报告中心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            width: 100%;
        }
        .header {
            text-align: center;
            margin-bottom: 50px;
            color: white;
        }
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        .reports-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        .report-card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            text-decoration: none;
            color: inherit;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            text-align: center;
            cursor: pointer;
        }
        .report-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }
        .report-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }
        .report-card h3 {
            font-size: 1.3em;
            margin-bottom: 10px;
            color: #333;
        }
        .report-card p {
            color: #666;
            font-size: 0.95em;
            margin-bottom: 15px;
        }
        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .footer {
            text-align: center;
            margin-top: 50px;
            color: white;
            opacity: 0.7;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 报告中心</h1>
            <p>选择下面的报告查看详情</p>
        </div>
        
        <div class="reports-grid">
            <a href="quark_report.html" class="report-card">
                <div class="report-icon">🦈</div>
                <h3>夸克洞察报告</h3>
                <p>数据分析与市场洞察</p>
                <button class="btn">查看报告</button>
            </a>
            
            <a href="qq_browser_report.html" class="report-card">
                <div class="report-icon">📱</div>
                <h3>QQ 浏览器报告</h3>
                <p>用户行为与流量分析</p>
                <button class="btn">查看报告</button>
            </a>
            
            <a href="yuanbao_report.html" class="report-card">
                <div class="report-icon">💎</div>
                <h3>腾讯元宝舆情月报</h3>
                <p>实时舆情监测与分析</p>
                <button class="btn">查看报告</button>
            </a>
        </div>
        
        <div class="footer">
            <p>© 2026 报告中心 | 所有报告版权归原作者所有</p>
        </div>
    </div>
</body>
</html>
